name: Release

on:
  push:
    tags: ["v*"]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: cp target/release/wayland-vdagent wayland-vdagent-x86_64-linux
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: wayland-vdagent-x86_64-linux
          generate_release_notes: true
